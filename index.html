<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense &amp; Budget Visualizer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="theme-light">

  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <h1 class="app-title">Expense &amp; Budget Visualizer</h1>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
      <span class="theme-toggle__icon">🌙</span>
      <span class="theme-toggle__label">Dark Mode</span>
    </button>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="app-main">

    <!-- Summary Cards -->
    <section class="summary-section" aria-label="Financial summary">
      <div class="summary-card">
        <h2 class="summary-card__title">Balance</h2>
        <p id="balance" class="summary-card__value balance--positive">$0.00</p>
      </div>
      <div class="summary-card summary-card--income">
        <h2 class="summary-card__title">Total Income</h2>
        <p id="total-income" class="summary-card__value">$0.00</p>
      </div>
      <div class="summary-card summary-card--expense">
        <h2 class="summary-card__title">Total Expenses</h2>
        <p id="total-expenses" class="summary-card__value">$0.00</p>
      </div>
    </section>

    <!-- Spending Limit Warning Banner -->
    <div id="spending-limit-warning" class="spending-limit-warning spending-limit-warning--hidden" role="alert" aria-live="polite"></div>

    <!-- Add Transaction Form -->
    <section class="form-section" aria-label="Add transaction">
      <h2 class="section-title">Add Transaction</h2>
      <form id="transaction-form" class="transaction-form" novalidate>

        <div class="form-group">
          <label for="tx-type" class="form-label">Type</label>
          <select id="tx-type" name="type" class="form-control" required>
            <option value="expense">Expense</option>
            <option value="income">Income</option>
          </select>
          <span id="tx-type-error" class="form-error" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="tx-category" class="form-label">Category</label>
          <select id="tx-category" name="category" class="form-control" required>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Housing">Housing</option>
            <option value="Health">Health</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Education">Education</option>
            <option value="Shopping">Shopping</option>
            <option value="Salary">Salary</option>
            <option value="Other">Other</option>
          </select>
          <span id="tx-category-error" class="form-error" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="tx-amount" class="form-label">Amount</label>
          <input
            id="tx-amount"
            name="amount"
            type="number"
            class="form-control"
            placeholder="0.00"
            min="0.01"
            max="999999999.99"
            step="0.01"
            required
          />
          <span id="tx-amount-error" class="form-error" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="tx-description" class="form-label">Description</label>
          <input
            id="tx-description"
            name="description"
            type="text"
            class="form-control"
            placeholder="Enter description"
            maxlength="100"
            required
          />
          <span id="tx-description-error" class="form-error" aria-live="polite"></span>
        </div>

        <button type="submit" class="btn btn--primary">Add Transaction</button>
      </form>
    </section>

    <!-- Spending Limit Section -->
    <section class="spending-limit-section" aria-label="Spending limit">
      <h2 class="section-title">Monthly Spending Limit</h2>
      <div class="spending-limit-form">
        <div class="form-group">
          <label for="spending-limit-input" class="form-label">Set Limit ($)</label>
          <input
            id="spending-limit-input"
            type="number"
            class="form-control"
            placeholder="e.g. 1000.00"
            min="0.01"
            max="999999999"
            step="0.01"
          />
          <span id="spending-limit-error" class="form-error" aria-live="polite"></span>
        </div>
        <button id="spending-limit-save" class="btn btn--secondary">Save Limit</button>
      </div>
    </section>

    <!-- Sort Control + Transaction List -->
    <section class="transactions-section" aria-label="Transaction list">
      <div class="transactions-header">
        <h2 class="section-title">Transactions</h2>
        <div class="sort-control">
          <label for="sort-select" class="form-label">Sort by:</label>
          <select id="sort-select" class="form-control form-control--sort">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
            <option value="amount-desc">Amount (High to Low)</option>
            <option value="amount-asc">Amount (Low to High)</option>
          </select>
        </div>
      </div>

      <ul id="transaction-list" class="transaction-list" aria-label="List of transactions">
        <li class="transaction-list__placeholder">No transactions recorded yet.</li>
      </ul>
    </section>

    <!-- Chart Section -->
    <section class="chart-section" aria-label="Spending chart">
      <h2 class="section-title">Spending by Category</h2>
      <div class="chart-container">
        <canvas id="chart-canvas" aria-label="Pie chart of expenses by category" role="img"></canvas>
        <p id="chart-placeholder" class="chart-placeholder">No expense data to display.</p>
      </div>
    </section>

  </main>

  <!-- Toast Notification -->
  <div id="toast" class="toast toast--hidden" role="alert" aria-live="assertive"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/script.js" defer></script>

</body>
</html>
